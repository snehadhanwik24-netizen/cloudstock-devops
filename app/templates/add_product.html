<!DOCTYPE html>
<html>

<head>

    <title>Add Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2>Add Product</h2>

<form method="POST">

<div class="mb-3">

<label>Product Name</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Quantity</label>

<input
type="number"
name="quantity"
class="form-control"
required>

</div>

<button class="btn btn-success">

Add Product

</button>

<a href="/products" class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</body>

</html>
