<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fc;
        }

        .card{
            border-radius:15px;
        }

        h2{
            font-weight:bold;
        }

        .btn{
            border-radius:8px;
        }
    </style>

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2 class="mb-4">
✏️ Edit Product
</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label fw-bold">

Product Name

</label>

<input
type="text"
name="name"
class="form-control"
value="{{ product[1] }}"
required>

</div>

<div class="mb-3">

<label class="form-label fw-bold">

Category

</label>

<input
type="text"
name="category"
class="form-control"
value="{{ product[2] }}"
required>

</div>

<div class="row">

<div class="col-md-6">

<div class="mb-3">

<label class="form-label fw-bold">

Quantity

</label>

<input
type="number"
name="quantity"
class="form-control"
value="{{ product[3] }}"
required>

</div>

</div>

<div class="col-md-6">

<div class="mb-3">

<label class="form-label fw-bold">

Price (₹)

</label>

<input
type="number"
name="price"
class="form-control"
step="0.01"
value="{{ product[4] }}"
required>

</div>

</div>

</div>
<div class="d-grid gap-2">

    <button
        type="submit"
        class="btn btn-warning">

        💾 Update Product

    </button>

    <a
        href="/products"
        class="btn btn-secondary">

        ⬅ Cancel

    </a>

</div>

</form>

</div>

</div>

</div>

</body>

</html>
