trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageName: 'cloudstockpro'

steps:
- checkout: self

- task: Docker@2
  displayName: Build Docker Image
  inputs:
    command: build
    Dockerfile: 'docker/Dockerfile'
    repository: '$(imageName)'
    tags: |
      latest

- task: Docker@2
  displayName: Push Docker Image
  inputs:
    command: push
    repository: '$(imageName)'
    containerRegistry: 'dockerhub-service-connection'
    tags: |
      latest
